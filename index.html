<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>생물 관찰 현미경 시뮬레이션</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="lab" aria-label="3D 현미경 조작 영역">
        <div id="scene" class="scene"></div>
        <div class="specimen-picker" aria-label="표본 선택">
          <h2>표본 선택</h2>
          <div class="specimen-grid" id="specimenGrid"></div>
        </div>
        <div class="scope-controls" aria-label="현미경 조작">
          <label class="slider-row">
            <span>배율</span>
            <input id="zoomControl" type="range" min="0" max="2" value="1" step="1" />
            <output id="zoomValue">100x</output>
          </label>
          <label class="slider-row">
            <span>초점</span>
            <input id="focusControl" type="range" min="0" max="100" value="35" />
            <output id="focusValue">35</output>
          </label>
          <label class="slider-row">
            <span>조명</span>
            <input id="lightControl" type="range" min="0" max="100" value="64" />
            <output id="lightValue">64</output>
          </label>
        </div>
        <button id="eyepieceObservePrompt" class="eyepiece-observe-prompt" type="button" aria-hidden="true">
          접안렌즈로 표본 관찰하기
        </button>
        <section id="observationOverlay" class="lab-scope-overlay" aria-label="현미경 확대 관찰 화면" aria-hidden="true">
          <div class="overlay-bar">
            <div>
              <span id="overlaySpecimen">버섯 균사</span>
              <strong id="overlayState">현미경 확대 화면</strong>
            </div>
            <button id="exitObserveButton" type="button">돌아가기</button>
          </div>
          <canvas id="fullScopeCanvas" width="1200" height="1200" aria-label="왼쪽 전체 현미경 시야"></canvas>
        </section>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
